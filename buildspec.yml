version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm install
  pre_build:
    commands:
      - echo Generating game catalogs and maps...
      - node scripts/generate-catalog.js
      - node scripts/generate-game-map.js
  build:
    commands:
      - echo Syncing build files to S3...
      # Syncing features directory containing games to S3
      - aws s3 sync features/ s3://$BUCKET_NAME/ --delete
  post_build:
    commands:
      - echo Invalidating CloudFront cache...
      - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
