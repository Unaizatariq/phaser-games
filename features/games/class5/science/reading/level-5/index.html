*{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Inter,'Trebuchet MS',Arial,sans-serif;color:#263238} body{background:#78d6ff}.game{position:fixed;inset:0;background:url('../../../../ui/bg-game.png') center/cover no-repeat;overflow:hidden}.game::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.05));pointer-events:none}.header{position:absolute;z-index:10;top:clamp(8px,2vh,18px);left:50%;transform:translateX(-50%);width:min(94vw,980px);min-height:58px;border-radius:999px;background:rgba(255,255,255,.86);border:3px solid rgba(255,255,255,.95);box-shadow:0 12px 28px rgba(0,0,0,.16);display:flex;align-items:center;justify-content:center;gap:clamp(14px,4vw,48px);padding:8px 18px;font-weight:900}.stat{display:flex;align-items:center;gap:8px;font-size:clamp(16px,2.4vw,23px)}.heart{color:#e53935}.star{color:#f9a825}.score{color:var(--theme)}.panel{position:absolute;z-index:5;left:50%;top:52%;transform:translate(-50%,-50%);width:min(94vw,960px);height:min(78vh,620px);border-radius:36px;background:rgba(255,246,217,.96);border:6px solid rgba(255,255,255,.96);box-shadow:0 20px 45px rgba(0,0,0,.22);overflow:hidden;padding:clamp(14px,2.4vw,24px)}.panel.reading{background:rgba(255,249,230,.97)}.topline{text-align:center;font-weight:900;color:var(--theme);font-size:clamp(20px,3vw,34px);line-height:1.2}.subline{text-align:center;margin:4px auto 10px;font-size:clamp(14px,2vw,19px);color:#455a64;min-height:28px}.stage{position:relative;height:calc(100% - 86px);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.25));border:3px dashed rgba(121,85,72,.16);overflow:hidden;padding:16px}.skyart{position:absolute;inset:0;pointer-events:none;opacity:.9}.hill{position:absolute;left:-5%;right:-5%;bottom:-12%;height:42%;background:linear-gradient(180deg,#bfe895,#8fce65);border-radius:50% 50% 0 0}.house{position:absolute;right:7%;bottom:19%;width:92 </style></head><body><div class="game" id="game"><div class="header"><div class="stat heart" id="lives">♥ ♥ ♥</div><div class="stat score" id="score">Score 0</div><div class="stat star" id="stars">☆ ☆ ☆</div></div><main class="panel" id="panel"><div class="topline" id="title"></div><div class="subline" id="sub"></div><section class="stage"><div class="skyart"><div class="hill"></div><div class="house"></div><div class="tree"></div></div><div class="content" id="content"></div></section></main><button class="btn secondary urduKey" id="kbBtn" style="display:none" aria-label="Urdu Keyboard" title="Urdu Keyboard">⌨️</button><div class="keyboard" id="keyboard"></div><a class="home homeIcon" aria-label="Home" title="Home" href="#" onclick="goHome();return false"><svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M12 3 3 10.6V21h6v-6h6v6h6V10.6L12 3zm0 2.6 7 5.7V19h-2v-6H7v6H5v-7.7l7-5.7z"/></svg></a><div class="feedback" id="overlay"><div class="popup" id="popup"></div></div><audio id="rightFx" src="../../../../ui/right.mp3" preload="auto"></audio><audio id="wrongFx" src="../../../../ui/wrong.mp3" preload="auto"></audio><audio id="completeFx" src="../../../../ui/level-complete.mp3" preload="auto"></audio></div><script>const DATA={"grade": "class5", "gradeLabel": "Class 5", "subject": "science", "subjectLabel": "Science", "skill": "reading", "level": 5, "topic": "Animals and Ecosystems", "questions": [{"prompt": "Animals live in different ecosystems.", "answer": "Animals", "options": ["Animals", "school", "home", "book"], "audioText": "Animals live in different ecosystems.", "art": "🐄", "questionText": "Which word is mentioned in this part of the story?", "activityTypes": ["comprehension", "sentence_order", "true_false", "fill_blank", "match_picture", "story_sequence"], "optionArts": {"Animals": "🐄", "school": "🏫", "home": "🔹", "book": "📘"}}, {"prompt": "Forests, deserts, and oceans are ecosystems.", "answer": "Animals", "options": ["Animals", "school", "home", "book"], "audioText": "Forests, deserts, and oceans are ecosystems.", "art": "🐄", "questionText": "According to the story about Animals and Ecosystems, choose the correct answer.", "activityTypes": ["comprehension", "sentence_order", "true_false", "fill_blank", "match_picture", "story_sequence"], "optionArts": {"Animals": "🐄", "school": "🏫", "home": "🔹", "book": "📘"}}, {"prompt": "Animals depend on plants and other animals.", "answer": "Animals", "options": ["Animals", "school", "home", "book"], "audioText": "Animals depend on plants and other animals.", "art": "🐄", "questionText": "Which word is mentioned in this part of the story?", "activityTypes": ["comprehension", "sentence_order", "true_false", "fill_blank", "match_picture", "story_sequence"], "optionArts": {"Animals": "🐄", "school": "🏫", "home": "🔹", "book": "📘"}}, {"prompt": "Every ecosystem must stay balanced.", "answer": "Animals", "options": ["Animals", "school", "home", "book"], "audioText": "Every ecosystem must stay balanced.", "art": "🐄", "questionText": "According to the story about Animals and Ecosystems, choose the correct answer.", "activityTypes": ["comprehension", "sentence_order", "true_false", "fill_blank", "match_picture", "story_sequence"], "optionArts": {"Animals": "🐄", "school": "🏫", "home": "🔹", "book": "📘"}}, {"prompt": "What is the story mainly about?", "answer": "Animals", "options": ["Animals", "school", "home", "book"], "audioText": "What is the story mainly about?", "art": "🐄", "questionText": "According to the story about Animals and Ecosystems, choose the correct answer.", "activityTypes": ["comprehension", "sentence_order", "true_false", "fill_blank", "match_picture", "story_sequence"], "optionArts": {"Animals": "🐄", "school": "🏫", "home": "🔹", "book": "📘"}}], "theme": ["#7b61ff", "#f0ecff"]};
const root=document.documentElement, game=document.getElementById('game'), panel=document.getElementById('panel'), content=document.getElementById('content'), overlay=document.getElementById('overlay'), popup=document.getElementById('popup');root.style.setProperty('--theme',DATA.theme[0]);root.style.setProperty('--soft',DATA.theme[1]);let idx=0,score=0,lives=3,correct=0,wrong=0,answers=[];let activeUtter=null;const isUrdu=DATA.subject==='urdu';
function goHome(){try{ if(parent&&parent!==window) parent.postMessage({type:'DIYAA_HOME'},'*'); else history.back(); }catch(e){history.back();}}
function updateHud(){document.getElementById('lives').textContent='♥ '.repeat(Math.max(0,lives)).trim();document.getElementById('score').textContent='Score '+score;let earned=Math.min(3,Math.floor((correct/DATA.questions.length)*3));document.getElementById('stars').textContent='★ '.repeat(earned)+'☆ '.repeat(3-earned)}
function fx(id){try{let a=document.getElementById(id);a.currentTime=0;a.volume=1.0;a.playbackRate=1.0;a.play().catch(()=>{})}catch(e){}}
function pickVoice(lang){try{let voices=speechSynthesis.getVoices()||[];let prefs=lang==='ur-PK'?['ur-PK','ur_PK','Urdu','Pakistan','ur']:['en-PK','English Pakistan','en-GB','en-US','English'];for(let p of prefs){let v=voices.find(x=>((x.lang||'')+' '+(x.name||'')).toLowerCase().includes(p.toLowerCase()));if(v)return v}}catch(e){}return null}

async function speak(text,onBoundary){try{speechSynthesis.cancel();let spoken=String(text||'').trim();if(!spoken)return;let lang=isUrdu?'ur-PK':'en-PK';
  if(window.DIYAA_TTS_ENDPOINT){try{let res=await fetch(window.DIYAA_TTS_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:spoken,lang,voice:isUrdu?'ur-PK-teacher':'en-PK-teacher'})});if(res.ok){let blob=await res.blob();let url=URL.createObjectURL(blob);let a=new Audio(url);a.volume=1.0;a.playbackRate=1.0;await a.play();return}}catch(apiErr){}}
  let u=new SpeechSynthesisUtterance(spoken);u.lang=lang;let v=pickVoice(lang);if(v)u.voice=v;u.rate=isUrdu?.76:.84;u.pitch=1.03;u.volume=1;u.onboundary=onBoundary||null;activeUtter=u;try{speechSynthesis.resume()}catch(e){}; speechSynthesis.speak(u)}catch(e){}}

try{speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}catch(e){}
function clean(s){return String(s||'').toLowerCase().replace(/[^a-z0-9\u0600-\u06ff]+/g,' ').trim()}

function iconFor(label){let s=clean(label);let map={
'mouse':'🖱️','keyboard':'⌨️','monitor':'🖥️','printer':'🖨️','speaker':'🔊','cpu':'🧠','scanner':'📠','computer':'💻','internet':'🌐',
'animal':'🐄','cat':'🐱','dog':'🐶','bird':'🐦','plant':'🌱','tree':'🌳','chair':'🪑','car':'🚗','table':'▭','water':'💧','sun':'☀️','moon':'🌙','eye':'👁️','ear':'👂','nose':'👃','hand':'✋','apple':'🍎','candy':'🍬','chips':'🍟','soda':'🥤','ball':'⚽','book':'📘','bag':'🎒','kite':'🪁','school':'🏫','family':'👨‍👩‍👧','teacher':'👩‍🏫','friend':'🧒','park':'🌳','mother':'👩','father':'👨','sister':'👧','brother':'👦',
'دوست':'🧒','استاد':'👩‍🏫','والد':'👨','بھائی':'👦','کتاب':'📘','گیند':'⚽','پتنگ':'🪁','پھول':'🌸','امی، ابو اور بہن':'👨‍👩‍👧','حروف':'🔤','دودھ':'🥛','سرخ پھول':'🌸'};return map[s]||(/^\d+$/.test(s)?'🔢':'●')}
function optionHTML(o){let art=(window.currentQuestion&&window.currentQuestion.optionArts&&window.currentQuestion.optionArts[o])||iconFor(o);return `<div style="font-size:clamp(28px,4vw,45px);line-height:1">${art}</div><div>${o}</div>`}
function renderMathVisual(q){if(!q.mathVisual)return null;let v=q.mathVisual;let wrap=document.createElement('div');wrap.className='mathVisual';let left=String(v.item||'🍎').repeat(Math.max(0,Math.min(10,v.a||0)));let right=String(v.item||'🍎').repeat(Math.max(0,Math.min(10,v.b||0)));if(v.op==='-'){wrap.innerHTML=`<div class="mathObjects">${left}</div><div class="mathEquation">${v.a} - ${v.b} = ?</div><div class="mathRemoved">Take away: ${String(v.item||'🍎').repeat(Math.max(0,Math.min(10,v.b||0)))}</div>`}else if(v.op==='count'){wrap.innerHTML=`<div class="mathObjects">${left}</div><div class="mathEquation">Count the objects</div>`}else{wrap.innerHTML=`<div class="mathObjects"><span>${left}</span><b> + </b><span>${right}</span></div><div class="mathEquation">${v.a} + ${v.b} = ?</div>`}return wrap}

function setHead(){document.getElementById('title').textContent=(DATA.skill==='reading'?'Story Adventure':DATA.skill.charAt(0).toUpperCase()+DATA.skill.slice(1)+' Challenge')+' • Level '+DATA.level;document.getElementById('sub').textContent=DATA.topic;panel.className='panel '+DATA.skill+(isUrdu?' urdu':'')}
function clear(){content.innerHTML='';speechSynthesis.cancel();}
function next(){idx++; if(idx>=DATA.questions.length) complete(); else render()}
function answer(ok){if(ok){correct++;score+=10;fx('rightFx')}else{wrong++;lives--;fx('wrongFx')}updateHud(); if(lives<=0) return gameOver(); setTimeout(next,650)}
function choiceButtons(q){window.currentQuestion=q;let div=document.createElement('div');div.className='choices';[...q.options].sort(()=>Math.random()-.5).forEach(o=>{let b=document.createElement('button');b.className='choice'+(isUrdu?' urdu':'');b.innerHTML=optionHTML(o);b.onclick=()=>answer(clean(o)===clean(q.answer));div.appendChild(b)});return div}
function render(){clear();setHead();let q=DATA.questions[idx];if(DATA.skill==='reading') return renderReading(q); if(DATA.skill==='listening') return renderListening(q); if(DATA.skill==='writing') return renderWriting(q); if(DATA.skill==='speaking') return renderSpeaking(q); return renderActivity(q)}
function renderReading(q){let visual=document.createElement('div');visual.className='visual';visual.textContent=q.art||'📖';let box=document.createElement('div');box.className='storybox '+(isUrdu?'urdu':'');let words=String(q.prompt).split(/\s+/);box.innerHTML=words.map((w,i)=>`<span class="word" data-i="${i}">${w}</span>`).join(' ');let btn=document.createElement('button');btn.className='btn';btn.textContent=isUrdu?'کہانی سنیں':'Read / Play Story';btn.onclick=()=>{let spans=[...box.querySelectorAll('.word')];let t=q.audioText||q.prompt;let wi=0;let fallback=setInterval(()=>{spans.forEach(s=>s.classList.remove('active'));if(spans[wi])spans[wi].classList.add('active');wi++;if(wi>=spans.length)clearInterval(fallback)},Math.max(480, t.length*32/Math.max(1,spans.length)));speak(t,(e)=>{if(e.name==='word'){let pos=String(t).slice(0,e.charIndex).split(/\s+/).length-1;spans.forEach(s=>s.classList.remove('active'));if(spans[pos])spans[pos].classList.add('active')}})};content.append(visual,box,btn);if(q.sentenceOrder&&q.sentenceOrder.length>1){let order=document.createElement('button');order.className='btn secondary';order.textContent=isUrdu?'جملے ترتیب دیں':'Arrange story sentences';order.onclick=()=>renderSentenceOrder(q);content.append(order)}let qline=document.createElement('div');qline.className='subline '+(isUrdu?'urdu':'');qline.textContent=q.questionText||(isUrdu?'کہانی کے مطابق درست جواب منتخب کریں۔':'Choose the answer that matches the story.');content.append(qline,choiceButtons(q))}
function renderSentenceOrder(q){clear();let title=document.createElement('div');title.className='storybox '+(isUrdu?'urdu':'');title.textContent=isUrdu?'کہانی کے جملوں کو درست ترتیب میں لگائیں۔':'Arrange the story sentences in the correct order.';let box=document.createElement('div');box.className='sentence '+(isUrdu?'urdu':'');box.textContent=isUrdu?'یہاں ترتیب بنائیں':'Build order here';let picked=[];let row=document.createElement('div');row.className='choices';[...q.sentenceOrder].sort(()=>Math.random()-.5).forEach(s=>{let b=document.createElement('button');b.className='choice '+(isUrdu?'urdu':'');b.textContent=s;b.onclick=()=>{if(box.textContent==='Build order here'||box.textContent==='یہاں ترتیب بنائیں')box.textContent='';picked.push(s);let chip=document.createElement('span');chip.className='wordchip '+(isUrdu?'urdu':'');chip.textContent=s;box.appendChild(chip);b.disabled=true};row.appendChild(b)});let check=document.createElement('button');check.className='btn';check.textContent=isUrdu?'چیک کریں':'Check order';check.onclick=()=>{let ok=JSON.stringify(picked)===JSON.stringify(q.sentenceOrder);answer(ok)};content.append(title,box,row,check)}
function renderListening(q){window.currentQuestion=q;let prompt=document.createElement('div');prompt.className='storybox '+(isUrdu?'urdu':'');prompt.textContent=q.prompt||(isUrdu?'آواز سنیں اور درست جواب منتخب کریں۔':'Listen carefully and choose the correct answer.');let btn=document.createElement('button');btn.className='btn';btn.textContent=isUrdu?'آواز دوبارہ سنیں':'Play Narration';btn.onclick=()=>speak(q.audioText||q.prompt);let mv=renderMathVisual(q);if(mv)content.append(mv);let row=document.createElement('div');row.className='choices';[...q.options].sort(()=>Math.random()-.5).forEach(o=>{let c=document.createElement('button');c.className='choice '+(isUrdu?'urdu':'');c.innerHTML=optionHTML(o);c.onclick=()=>answer(clean(o)===clean(q.answer));row.appendChild(c)});content.append(prompt,btn,row);setTimeout(()=>speak(q.audioText||q.prompt),180)}
function renderWriting(q){let box=document.createElement('div');box.className='storybox '+(isUrdu?'urdu':'');box.textContent=q.prompt;let inp=document.createElement('input');inp.className='typeInput '+(isUrdu?'urdu':'');inp.placeholder=isUrdu?'یہاں لکھیں':'Type here';let check=document.createElement('button');check.className='btn';check.textContent='Check';check.onclick=()=>answer(clean(inp.value)===clean(q.answer));content.append(box,inp,check);if(isUrdu) setupKeyboard(inp);}
function renderSpeaking(q){let box=document.createElement('div');box.className='storybox '+(isUrdu?'urdu':'');box.textContent=q.prompt;let mic=document.createElement('button');mic.className='micPulse';mic.textContent='🎙';let heard=document.createElement('div');heard.className='subline';mic.onclick=()=>{speak(q.audioText||q.prompt);let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){heard.textContent='Speech recognition not available. Use I said it.';return}let r=new SR();r.lang=isUrdu?'ur-PK':'en-PK';r.interimResults=false;r.onresult=e=>{let text=e.results[0][0].transcript;heard.textContent='Heard: '+text;answer(clean(text).includes(clean(q.answer))||clean(q.answer).includes(clean(text)))};r.onerror=()=>heard.textContent='Mic needs localhost/HTTPS permission.';r.start()};let manual=document.createElement('button');manual.className='btn secondary';manual.textContent='I said it';manual.onclick=()=>answer(true);content.append(box,mic,heard,manual)}
function renderActivity(q){window.currentQuestion=q;let box=document.createElement('div');box.className='storybox';box.textContent=q.prompt;let mv=renderMathVisual(q);if(mv)content.append(mv);content.append(box,choiceButtons(q))}
function setupKeyboard(inp){document.getElementById('kbBtn').style.display='flex';const letters='ا ب پ ت ٹ ث ج چ ح خ د ڈ ذ ر ڑ ز ژ س ش ص ض ط ظ ع غ ف ق ک گ ل م ن و ہ ھ ء ی ے'.split(' ');let kb=document.getElementById('keyboard');kb.innerHTML='';letters.forEach(l=>{let k=document.createElement('button');k.className='key';k.textContent=l;k.onclick=()=>{inp.value+=l;inp.focus()};kb.appendChild(k)});let sp=document.createElement('button');sp.className='key';sp.textContent='space';sp.onclick=()=>inp.value+=' ';kb.appendChild(sp);document.getElementById('kbBtn').onclick=()=>kb.classList.toggle('show')}
function starsEarned(){let r=correct/DATA.questions.length;return r>=.85?3:r>=.55?2:1}
function complete(){fx('completeFx');panel.classList.add('blurred');let s=starsEarned();overlay.style.display='flex';popup.innerHTML=`<h2>Level Complete</h2><div style="font-size:34px;color:#f9a825">${'★'.repeat(s)}${'☆'.repeat(3-s)}</div><div class="resultGrid"><div>Score<br>${score}</div><div>Correct<br>${correct}</div><div>Wrong<br>${wrong}</div><div>Lives<br>${lives}</div></div><button class="btn" onclick="location.reload()">Replay</button> <button class="btn secondary" onclick="goHome()">⌂ Home</button>`}
function gameOver(){panel.classList.add('blurred');overlay.style.display='flex';popup.innerHTML=`<h2>Game Over</h2><p>Try again and earn more stars.</p><div class="resultGrid"><div>Score<br>${score}</div><div>Correct<br>${correct}</div></div><button class="btn" onclick="location.reload()">Replay</button> <button class="btn secondary" onclick="goHome()">⌂ Home</button>`}
updateHud();render();</script></body></html>
